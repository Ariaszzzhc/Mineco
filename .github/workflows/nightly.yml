name: Nightly Build

on:
  schedule:
    # 每天 UTC 14:00 = 北京时间 22:00
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mineco-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/installers/
          if-no-files-found: warn
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) -exec cp {} release/ \;
          ls -la release/

      - name: Get version & date
        id: info
        run: |
          echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Delete old nightly release & tag
        run: |
          gh release delete nightly --yes || true
          git push origin :nightly || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly (v${{ steps.info.outputs.VERSION }})
          body: |
            ## Mineco Nightly Build

            📅 **日期**: ${{ steps.info.outputs.DATE }}
            📦 **版本**: v${{ steps.info.outputs.VERSION }}
            🔨 **Commit**: ${{ steps.info.outputs.COMMIT }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | 🪟 Windows | `.exe` / `.msi` |
            | 🍎 macOS | `.dmg` |
            | 🐧 Linux | `.deb` / `.AppImage` |

            ---
            > ⚠️ 这是自动构建的 nightly 版本，仅供测试使用。

          files: release/*
          draft: false
          prerelease: true
